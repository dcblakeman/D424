name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DEPLOYMENT_PROVIDER: GitHub Pages
      DEPLOYMENT_URL: https://dcblakeman.github.io/D424/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate deployment site
        shell: pwsh
        run: ./deploy/build-pages.ps1 -OutputDir public

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
